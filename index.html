<script type="module">
import * as THREE from 'three';

// ============ GLOBALS ============
const STATE = {
  current: 'LOADING',
  cakeGroup: null,
  flameLights: [],
  flameMeshes: [],
  heartAlpha: 0,
  glowParticles: [],
  photoElements: [],
  photoArcParams: [],
  rewindInterval: null,
  pulseInterval: null,
  popIndex: 0,
  popTotal: 0
};

let scene, camera, renderer, cakeGroup;
let heartCtx, heartCanvas;
let allPhotos = [];
let heartContourPoints = [];
let heartArcTable = [];  // [{s, x, y}] normalized arc length
let totalArcLength = 0;

// ============ HEART MATH ============
function heartX(t){ return 14*Math.pow(Math.sin(t),3) }
function heartY(t){ return 12*Math.cos(t)-3.5*Math.cos(2*t)-1.2*Math.cos(3*t)-0.4*Math.cos(4*t) }

function buildHeartContour(n=500){
  const points=[];
  let prevX=null, prevY=null, total=0;
  for(let i=0;i<=n;i++){
    const t=(i/n)*Math.PI*2;
    const x=heartX(t), y=heartY(t);
    if(prevX!==null){
      const dx=x-prevX, dy=y-prevY;
      total+=Math.sqrt(dx*dx+dy*dy);
    }
    points.push({t,x,y,s:total});
    prevX=x;prevY=y;
  }
  return {points,totalArcLength:total};
}

function buildArcTable(points,totalLen){
  return points.map(p=>({s:p.s/totalLen,x:p.x,y:p.y}));
}

// binary search arc table for a given normalized s
function getHeartPos(s){
  s=((s%1)+1)%1;
  let lo=0,hi=heartArcTable.length-1;
  while(hi-lo>1){
    const mid=(lo+hi)>>1;
    if(heartArcTable[mid].s<=s) lo=mid;
    else hi=mid;
  }
  const a=heartArcTable[lo], b=heartArcTable[hi];
  const rangeS=b.s-a.s||0.0001;
  const frac=(s-a.s)/rangeS;
  return {x:a.x+(b.x-a.x)*frac, y:a.y+(b.y-a.y)*frac};
}

// ============ AUDIO: Happy Birthday synth ============
let audioCtx=null;
function playBirthdaySong(){
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  const now=audioCtx.currentTime;
  // Happy Birthday melody (MIDI notes)
  const notes=[
    67,67,69,67,72,71, // G G A G C B
    67,67,69,67,74,72, // G G A G D C
    67,67,79,76,72,71,69, // G G G E C B A
    77,77,76,72,74,72    // F F E C D C
  ];
  const durations=[
    0.375,0.125,0.5,0.5,0.5,1,
    0.375,0.125,0.5,0.5,0.5,1,
    0.375,0.125,0.5,0.5,0.5,0.5,0.5,
    0.375,0.125,0.5,0.5,0.5,1.5
  ];
  let t=0;
  const totalDur=durations.reduce((a,b)=>a+b,0);
  for(let i=0;i<notes.length;i++){
    const freq=440*Math.pow(2,(notes[i]-69)/12);
    const dur=durations[i];
    playNote(freq,now+t,dur*0.9);
    t+=dur;
  }
  return totalDur*1000; // return duration in ms
}

function playNote(freq,startTime,duration){
  const dest=audioCtx.destination;
  const now=startTime;
  // Piano tone: multiple harmonics with percussive envelope
  const harmonics=[
    {mult:1, amp:0.22},  // fundamental
    {mult:2, amp:0.14},  // octave
    {mult:3, amp:0.09},  // octave + fifth
    {mult:4, amp:0.05},  // 2 octaves
    {mult:5, amp:0.03},  // 2 octaves + major third
    {mult:6, amp:0.015}, // 2 octaves + fifth
  ];
  harmonics.forEach(h=>{
    const osc=audioCtx.createOscillator();
    const gain=audioCtx.createGain();
    osc.type='sine';
    osc.frequency.value=freq*h.mult*(1+(h.mult-1)*0.0003); // slight inharmonicity
    // Piano envelope: quick attack → short decay → sustain → release
    const attack=0.003;
    const decayPeak=duration*0.12;
    const sustainLevel=h.amp*0.55;
    gain.gain.setValueAtTime(0,now);
    gain.gain.linearRampToValueAtTime(h.amp,now+attack);
    gain.gain.exponentialRampToValueAtTime(sustainLevel,now+decayPeak);
    gain.gain.setValueAtTime(sustainLevel,now+duration*0.7);
    gain.gain.exponentialRampToValueAtTime(0.001,now+duration);
    osc.connect(gain);gain.connect(dest);
    osc.start(now);osc.stop(now+duration+0.1);
  });
}

function playSaxophoneBirthday(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  const now=audioCtx.currentTime;
  const notes=[
    67,67,69,67,72,71,
    67,67,69,67,74,72,
    67,67,79,76,72,71,69,
    77,77,76,72,74,72
  ];
  const durations=[
    0.5,0.15,0.6,0.6,0.6,1.2,
    0.5,0.15,0.6,0.6,0.6,1.2,
    0.5,0.15,0.6,0.6,0.6,0.6,0.6,
    0.5,0.15,0.6,0.6,0.6,1.6
  ];
  let t=0;
  const totalDur=durations.reduce((a,b)=>a+b,0);
  for(let i=0;i<notes.length;i++){
    const freq=440*Math.pow(2,(notes[i]-69)/12);
    const dur=durations[i];
    playSaxNote(freq,now+t,dur);
    t+=dur;
  }
  return totalDur*1000;
}

function playSaxNote(freq,startTime,duration){
  const dest=audioCtx.destination;
  // Saxophone: sawtooth through low-pass filter with vibrato
  const osc=audioCtx.createOscillator();
  const filter=audioCtx.createBiquadFilter();
  const gain=audioCtx.createGain();
  osc.type='sawtooth';
  osc.frequency.value=freq;
  // Subtle vibrato
  const vibrato=audioCtx.createOscillator();
  const vibratoGain=audioCtx.createGain();
  vibrato.type='sine';
  vibrato.frequency.value=5.5;
  vibratoGain.gain.value=2;
  vibrato.connect(vibratoGain);
  vibratoGain.connect(osc.frequency);
  vibrato.start(startTime);vibrato.stop(startTime+duration+0.1);
  // Low-pass filter for warmth
  filter.type='lowpass';
  filter.frequency.value=1800;
  filter.Q.value=1.5;
  // Envelope: gentle attack, sustain, slow release
  gain.gain.setValueAtTime(0,startTime);
  gain.gain.linearRampToValueAtTime(0.18,startTime+0.06);
  gain.gain.setValueAtTime(0.18,startTime+duration*0.8);
  gain.gain.exponentialRampToValueAtTime(0.001,startTime+duration);
  osc.connect(filter);
  filter.connect(gain);
  gain.connect(dest);
  osc.start(startTime);osc.stop(startTime+duration+0.1);
  // Warm sub-tone
  const sub=audioCtx.createOscillator();
  const subGain=audioCtx.createGain();
  sub.type='sine';
  sub.frequency.value=freq/2;
  subGain.gain.setValueAtTime(0,startTime);
  subGain.gain.linearRampToValueAtTime(0.06,startTime+0.04);
  subGain.gain.exponentialRampToValueAtTime(0.001,startTime+duration);
  sub.connect(subGain);subGain.connect(dest);
  sub.start(startTime);sub.stop(startTime+duration+0.1);
  // Bell chime overlay
  const bell=audioCtx.createOscillator();
  const bellGain=audioCtx.createGain();
  bell.type='sine';
  bell.frequency.value=freq*3;
  bellGain.gain.setValueAtTime(0,startTime);
  bellGain.gain.linearRampToValueAtTime(0.08,startTime+0.005);
  bellGain.gain.exponentialRampToValueAtTime(0.001,startTime+duration*0.2);
  bell.connect(bellGain);bellGain.connect(dest);
  bell.start(startTime);bell.stop(startTime+duration*0.25);
}

// ============ THREE.JS CAKE ============
function initThreeJS(){
  const canvas=document.getElementById('three-canvas');
  renderer=new THREE.WebGLRenderer({canvas,alpha:true,antialias:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(window.innerWidth,window.innerHeight);
  renderer.shadowMap.enabled=true;
  renderer.setClearColor(0x000000,0);
  scene=new THREE.Scene();
  const aspect=window.innerWidth/window.innerHeight;
  camera=new THREE.PerspectiveCamera(45,aspect,0.1,100);
  camera.position.set(0,1.5,8);
  camera.lookAt(0,-0.5,0);

  const ambient=new THREE.AmbientLight(0xffccdd,0.5);
  scene.add(ambient);
  const dirLight=new THREE.DirectionalLight(0xffffff,1.2);
  dirLight.position.set(3,5,5);
  dirLight.castShadow=true;
  scene.add(dirLight);

  cakeGroup=new THREE.Group();
  // Bottom tier
  const geoBottom=new THREE.CylinderGeometry(1.2,1.25,0.45,48);
  const matBottom=new THREE.MeshToonMaterial({color:0xffc0cb});
  const bottom=new THREE.Mesh(geoBottom,matBottom);
  bottom.position.y=-0.5;
  bottom.castShadow=true;bottom.receiveShadow=true;
  cakeGroup.add(bottom);
  // Frosting band bottom
  const geoBand1=new THREE.TorusGeometry(1.22,0.06,8,48);
  const matFrost=new THREE.MeshToonMaterial({color:0xffffff});

function animateCakeRise(duration=3000){
  return new Promise(resolve=>{
    const startY=-5, endY=-0.8;
    const startTime=performance.now();
    const glowSprite=cakeGroup.getObjectByName('cakeGlow');
    function step(now){
      const elapsed=now-startTime;
      const t=Math.min(elapsed/duration,1);
      const c1=1.70158;
      const eased=1+(c1+1)*Math.pow(t-1,3)+c1*Math.pow(t-1,2);
      cakeGroup.position.y=startY+(endY-startY)*eased;
      // Glow pulses during rise
      if(glowSprite){
        const glowScale=4+2*Math.sin(elapsed*0.006);
        glowSprite.scale.set(glowScale,glowScale,1);
        glowSprite.material.opacity=0.3+0.4*t;
      }
      if(t<1){
        requestAnimationFrame(step);
      }else{
        cakeGroup.position.y=endY;
        resolve();
        // Start continuous idle bounce + glow pulse
        startCakeIdle(glowSprite,endY);
      }
    }
    requestAnimationFrame(step);
  });
}

let cakeIdleInterval=null;
function startCakeIdle(glowSprite,baseY){
  if(cakeIdleInterval) clearInterval(cakeIdleInterval);
  const startTime=performance.now();
  cakeIdleInterval=setInterval(()=>{
    const elapsed=(performance.now()-startTime)/1000;
    // Gentle float up and down
    const bob=Math.sin(elapsed*1.3)*0.15;
    cakeGroup.position.y=baseY+bob;
    // Subtle rotation sway
    cakeGroup.rotation.z=Math.sin(elapsed*0.7)*0.03;
    // Glow keeps pulsing
    if(glowSprite){
      const glowScale=4.5+1.5*Math.sin(elapsed*1.8);
      glowSprite.scale.set(glowScale,glowScale,1);
      glowSprite.material.opacity=0.2+0.15*Math.sin(elapsed*2.2);
    }
  },30);
}

function lightCandles(){
  const fl=STATE.flameMeshes;
  const start=performance.now();
  function pulse(now){
    const elapsed=(now-start)/1000;
    const scale=0.3+0.7*Math.min(elapsed/0.5,1);
    const flicker=1+0.15*Math.sin(elapsed*25)+0.1*Math.sin(elapsed*37);
    fl.forEach(f=>{
      f.scale.setScalar(scale*flicker);
      f.material.color.setHSL(0.12,1,0.5+0.2*Math.sin(elapsed*20));
    });
    STATE.flameLights.forEach(l=>{
      l.intensity=Math.min(1.5,elapsed/0.3)*flicker*2;
    });
    if(elapsed<2) requestAnimationFrame(pulse);
  }
  requestAnimationFrame(pulse);
}

  });
  // Initialize glow particles

function drawHeart(alpha){
  if(!heartCtx) return;
  const ctx=heartCtx;
  const W=heartCanvas.width, H=heartCanvas.height;
  ctx.clearRect(0,0,W,H);
  if(alpha<=0) return;
  const cx=W/2, cy=H*0.55;
  const scale=Math.min(W,H)*0.022;
  ctx.save();
  ctx.globalAlpha=alpha;

  // Outer glow
  ctx.shadowColor='#ff4488';
  ctx.shadowBlur=30;
  ctx.beginPath();
  for(let i=0;i<heartContourPoints.length;i++){
    const p=heartContourPoints[i];
    const sx=cx+p.x*scale, sy=cy-p.y*scale;
    if(i===0) ctx.moveTo(sx,sy); else ctx.lineTo(sx,sy);
  }
  ctx.closePath();
  ctx.strokeStyle='#ff6b9d';
  ctx.lineWidth=12;
  ctx.stroke();

  // Inner brighter line
  ctx.shadowBlur=20;
  ctx.shadowColor='#ff9ec4';
  ctx.strokeStyle='#ffb3cc';
  ctx.lineWidth=5;
  ctx.stroke();

  // Glow particles
  ctx.shadowBlur=12;
  ctx.shadowColor='#ffccdd';
  for(const p of STATE.glowParticles){
    const pos=getHeartPos(p.s);
    const sx=cx+pos.x*scale, sy=cy-pos.y*scale;
    const grad=ctx.createRadialGradient(sx,sy,0,sx,sy,p.size*3);
    grad.addColorStop(0,'rgba(255,255,255,0.9)');
    grad.addColorStop(0.3,'rgba(255,180,200,0.6)');
    grad.addColorStop(1,'rgba(255,100,150,0)');
    ctx.fillStyle=grad;
    ctx.beginPath();
    ctx.arc(sx,sy,p.size*3,0,Math.PI*2);
    ctx.fill();
    p.s=(p.s+p.speed)%1;
  }
  ctx.restore();
}

async function buildPhotoList(){
  try{
    const res=await fetch('photos/manifest.json');
    const manifest=await res.json();
    return manifest.map(m=>'photos/'+m.file);
  }catch(e){
    console.warn('Manifest not found, falling back to 124 photos');
    const list=[];
    for(let i=1;i<=124;i++){
      list.push('photos/photo_'+String(i).padStart(3,'0')+'.png');
    }
    return list;
  }
}

async function preloadImages(paths,onProgress){
  const loaded=[];
  const BATCH=10;
  for(let start=0;start<paths.length;start+=BATCH){
    const batch=paths.slice(start,start+BATCH).map(path=>{
      return new Promise(resolve=>{
        const img=new Image();
        img.src=path;
        img.onload=()=>resolve(img);
        img.onerror=()=>{console.warn('Failed:',path);resolve(null);};
      });
    });
    const results=await Promise.all(batch);
    for(const r of results){if(r) loaded.push(r);}
    if(onProgress) onProgress(Math.min((start+BATCH)/paths.length,1));
  }
  return loaded;
}

const PHOTO_SIZE=76;
function getHeartScreenPos(s,outerScale=1){
  const W=window.innerWidth, H=window.innerHeight;
  const cx=W/2, cy=H*0.55;
  const scale=Math.min(W,H)*0.022*outerScale;
  const pos=getHeartPos(s);
  return {x:cx+pos.x*scale-PHOTO_SIZE/2, y:cy-pos.y*scale-PHOTO_SIZE/2};
}

function createPhotoElements(images){
  const layer=document.getElementById('photos-layer');
  layer.innerHTML='';
  STATE.photoElements=[];
  STATE.photoArcParams=[];
  const n=images.length;
  for(let i=0;i<n;i++){
    const halfIdx=Math.floor(i/2);
    const side=i%2===0?0:1;
    const halfN=Math.ceil(n/2);
    const normS=halfIdx/halfN*0.5;
    const s=side===0?normS:(1-normS)%1;
    const el=document.createElement('img');
    el.className='photo-thumb';
    el.src=images[i].src;
    el.style.width=PHOTO_SIZE+'px';
    el.style.height=PHOTO_SIZE+'px';
    el.style.opacity='0';
    el.style.transform='scale(0)';
    // Small random offset for organic feel
    const jitterX=(Math.random()-0.5)*18;
    const jitterY=(Math.random()-0.5)*18;
    const pos=getHeartScreenPos(s);
    el.style.left=(pos.x+jitterX)+'px';
    el.style.top=(pos.y+jitterY)+'px';
    layer.appendChild(el);
    STATE.photoElements.push(el);
    STATE.photoArcParams.push({s,baseS:s,el,i,popped:false,outerScale:1,jitterX,jitterY});
  }
  STATE.popIndex=0;
}

async function animatePhotosPop(){
  const n=STATE.photoElements.length;
  STATE.popTotal=n;
  // Sort by distance from top (s close to 0 or 1)
  const sorted=STATE.photoArcParams.map((p,i)=>({...p,idx:i})).sort((a,b)=>{
    const distA=Math.min(a.s,1-a.s);
    const distB=Math.min(b.s,1-b.s);
    return distA-distB;
  });
  return new Promise(resolve=>{
    let i=0;
    const interval=setInterval(()=>{
      if(i>=sorted.length){
        clearInterval(interval);
        resolve();
        return;
      }
      const item=sorted[i];
      const el=STATE.photoElements[item.idx];
      el.style.opacity='1';
      el.style.transform='scale(1)';
      el.style.transition='transform 0.35s cubic-bezier(0.175,0.885,0.32,1.275), opacity 0.2s';
      STATE.photoArcParams[item.idx].popped=true;
      i++;
    },25);
  });
}

let modeHintTimeout=null;
function showModeHint(){
  const hint=document.getElementById('mode-hint');
  const svg=document.getElementById('mode-hint-svg');
  const path=document.createElementNS('http://www.w3.org/2000/svg','path');
  path.id='mode-hint-path';
  const arrow=document.createElementNS('http://www.w3.org/2000/svg','polygon');
  arrow.id='mode-hint-arrow';
  arrow.setAttribute('fill','#ff9ec4');

  // Calculate positions: heart right edge → mode buttons
  const W=window.innerWidth, H=window.innerHeight;
  const heartCx=W/2;
  const heartCy=H*0.55;
  const scale=Math.min(W,H)*0.022;
  // Heart rightmost point (at x≈14 from heart equation)
  const heartRightX=heartCx+14*scale;
  const heartRightY=heartCy-3*scale; // upper-right of heart
  const btnAreaX=W-100; // near the mode buttons
  const btnAreaY=H*0.45; // upper half of buttons

  // Winding bezier curve from heart right toward buttons
  const startX=heartRightX+20;
  const startY=heartRightY;
  const endX=btnAreaX-20;
  const endY=btnAreaY;
  const cp1x=startX+(endX-startX)*0.35;
  const cp1y=startY-35;
  const cp2x=startX+(endX-startX)*0.7;
  const cp2y=endY+25;
  const d=`M${startX},${startY} C${cp1x},${cp1y} ${cp2x},${cp2y} ${endX},${endY}`;
  path.setAttribute('d',d);
  path.setAttribute('stroke-dashoffset','300');

function startFrameMode(){
  stopPhotoFlood();
  // Clear any stale timeouts from previous runs
  if(STATE._rewindStopTimeout){clearTimeout(STATE._rewindStopTimeout);STATE._rewindStopTimeout=null;}
  if(STATE._rewindFilmTimeout){clearTimeout(STATE._rewindFilmTimeout);STATE._rewindFilmTimeout=null;}
  const elements=STATE.photoElements;
  const params=STATE.photoArcParams;
  const targetOuterScale=1.35;
  let currentScale=1;
  let orbitInterval=null;
  let popOutInterval=null;

  // Reset photos to heart contour first
  elements.forEach(el=>{
    el.style.opacity='1';
    el.style.transform='scale(1)';
    el.style.transition='none';
    el.style.width=PHOTO_SIZE+'px';
    el.style.height=PHOTO_SIZE+'px';
    el.style.boxShadow='0 4px 15px rgba(255,107,157,0.4)';
    el.style.border='2px solid rgba(255,255,255,0.6)';
    el.style.borderRadius='8px';
    el.style.zIndex='';
  });
  params.forEach(p=>{p.s=p.baseS;});

  // Phase 1: smooth expand to outer contour
  const expandStart=performance.now();
  const expandDuration=1200;
  const expandInterval=setInterval(()=>{
    const elapsed=performance.now()-expandStart;
    const t=Math.min(elapsed/expandDuration,1);
    const eased=t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
    currentScale=1+(targetOuterScale-1)*eased;
    params.forEach((p,i)=>{
      const pos=getHeartScreenPos(p.s,currentScale);
      const el=elements[i];
      el.style.left=(pos.x+(p.jitterX||0))+'px';
      el.style.top=(pos.y+(p.jitterY||0))+'px';
    });
    if(t>=1){
      clearInterval(expandInterval);
      startOrbit();
    }
  },16);

  function startOrbit(){
    // Phase 2: orbit around outer contour
    orbitInterval=setInterval(()=>{
      params.forEach((p,i)=>{
        p.s=(p.s+0.0006)%1;
        const pos=getHeartScreenPos(p.s,targetOuterScale);
        const el=elements[i];
        el.style.left=(pos.x+(p.jitterX||0))+'px';
        el.style.top=(pos.y+(p.jitterY||0))+'px';
      });
    },16);

    // Random pop-outs
    popOutInterval=setInterval(()=>{
      const idx=Math.floor(Math.random()*elements.length);
      const el=elements[idx];
      el.style.transition='transform 0.25s ease-out';
      el.style.transform='scale(2.2)';
      el.style.zIndex='10';
      setTimeout(()=>{
        el.style.transition='transform 0.4s ease-in';
        el.style.transform='scale(1)';
        el.style.zIndex='';
      },800);
    },1500);

    // Stop after ~6s, then film reveal
    STATE._rewindStopTimeout=setTimeout(()=>{
      if(orbitInterval) clearInterval(orbitInterval);
      if(popOutInterval) clearInterval(popOutInterval);
      orbitInterval=null;popOutInterval=null;
      elements.forEach(el=>{
        el.style.transition='all 0.8s ease';
        el.style.opacity='0.5';
      });
      console.log('Frame mode orbit done, scheduling film reveal...');
      STATE._rewindFilmTimeout=setTimeout(()=>{
        console.log('Calling showFilmFrame now');
        showFilmFrame();
      },1200);
    },6000);
  }

  // Store cleanup refs for mode switch
  modeAnimInterval={clear:()=>{
    if(orbitInterval) clearInterval(orbitInterval);
    if(popOutInterval) clearInterval(popOutInterval);
    if(STATE._rewindStopTimeout) clearTimeout(STATE._rewindStopTimeout);
    if(STATE._rewindFilmTimeout) clearTimeout(STATE._rewindFilmTimeout);
    orbitInterval=null;popOutInterval=null;
  }};
}

// Shared larger thumbnail size for film & bloom modes
function getModePhotoSize(){
  return window.innerWidth/9;
}

function startFilmMode(){
  startPhotoFlood();
  const elements=STATE.photoElements;
  const photoW=getModePhotoSize();
  const photoH=photoW;
  const framePad=8;
  const sprocketH=12;
  const stripPad=6;
  const frameW=photoW+framePad*2;
  const frameH=photoH+framePad*2;
  const stripH=stripPad+sprocketH+frameH+sprocketH+stripPad;
  const gap=5;

  const marginX=20;
  const colsPerRow=Math.floor((window.innerWidth-marginX*2)/frameW);
  const rowWidth=colsPerRow*frameW;
  const n=elements.length;
  const totalRows=Math.ceil(n/colsPerRow);

  document.querySelectorAll('.film-strip-row').forEach(s=>s.remove());

  // Assign photos to rows in snake order
  const rowPhotos=[];
  for(let r=0;r<totalRows;r++) rowPhotos.push([]);
  for(let i=0;i<n;i++){
    const row=Math.floor(i/colsPerRow);
    rowPhotos[row].push(elements[i]);
  }

  const strips=[];
  const baseY=20;
  for(let r=0;r<totalRows;r++){
    const fromLeft=r%2===0;
    const photos=rowPhotos[r];
    // Order: if fromLeft, natural L→R; if fromRight, reversed R→L
    const ordered=(fromLeft)?photos:[...photos].reverse();
    // One segment = enough photos to fill screen width
    const segCount=colsPerRow;
    const segW=segCount*frameW;

    const strip=document.createElement('div');
    strip.className='film-strip-row';
    strip.style.cssText=`
      position:fixed;z-index:3;height:${stripH}px;width:100vw;
      background:#1a1a1a;overflow:hidden;
      box-shadow:0 2px 12px rgba(0,0,0,0.6);
      top:${baseY+r*(stripH+gap)}px;left:0;
    `;

    // Inner scrolling wrapper — grows as we append random photos indefinitely
    const inner=document.createElement('div');
    inner.className='film-inner';
    inner.style.cssText=`position:relative;height:100%;display:flex;flex-direction:column;`;

    function buildSeg(n){
      const frag=document.createDocumentFragment();
      const spTop=document.createElement('div');
      spTop.style.cssText=`height:${sprocketH}px;display:flex;gap:${frameW-8}px;padding-left:${framePad+4}px;margin-top:${stripPad}px;flex-shrink:0;`;
      for(let i=0;i<n;i++){const h=document.createElement('div');h.style.cssText='width:8px;height:12px;background:#0a0a0a;border-radius:2px;flex-shrink:0;';spTop.appendChild(h);}
      frag.appendChild(spTop);
      const pRow=document.createElement('div');
      pRow.style.cssText=`height:${frameH}px;display:flex;flex-shrink:0;`;
      for(let i=0;i<n;i++){
        const rand=allPhotos[Math.floor(Math.random()*allPhotos.length)];
        const img=document.createElement('img');
        img.src=rand.src;
        img.style.cssText=`width:${photoW}px;height:${photoH}px;object-fit:cover;border:none;border-radius:1px;opacity:0.55;margin:0 ${framePad}px;flex-shrink:0;`;
        pRow.appendChild(img);
      }
      frag.appendChild(pRow);
      const spBot=document.createElement('div');
      spBot.style.cssText=`height:${sprocketH}px;display:flex;gap:${frameW-8}px;padding-left:${framePad+4}px;margin-bottom:${stripPad}px;flex-shrink:0;`;
      for(let i=0;i<n;i++){const h=document.createElement('div');h.style.cssText='width:8px;height:12px;background:#0a0a0a;border-radius:2px;flex-shrink:0;';spBot.appendChild(h);}
      frag.appendChild(spBot);
      return frag;
    }

    // Start with 4 segments of random photos
    for(let s=0;s<4;s++) inner.appendChild(buildSeg(segCount));
    inner.style.width=(segW*4)+'px';
    strip.appendChild(inner);
    document.body.appendChild(strip);
    photos.forEach(el=>{el.style.display='none';});
    strips.push({inner, segW, segCount, fromLeft, offset:0, buildSeg, totalSegs:4, stripEl:strip});
  }

  // Infinite scroll: recycle off-screen segments with fresh random photos
  const SPEED=0.7;
  function scrollLoop(ts){
    if(!modeAnimInterval) return;
    strips.forEach(s=>{
      // fromLeft=true: content moves left (negative X), rows appear to scroll RIGHT
      // fromLeft=false: content moves right (positive X), rows appear to scroll LEFT
      s.offset+=SPEED*(s.fromLeft?-1:1);
      // If content scrolled left by one segment: leftmost segment is off-screen → recycle to right end
      if(s.offset<=-s.segW){
        s.offset+=s.segW;
        // Remove leftmost segment (first 3 children in inner wrapper)
        for(let c=0;c<3;c++) s.inner.firstElementChild.remove();
        // Append fresh random segment at right end
        s.inner.appendChild(s.buildSeg(s.segCount));
      }
      // If content scrolled right by one segment: rightmost segment is off-screen → recycle to left end
      if(s.offset>=s.segW){
        s.offset-=s.segW;
        // Remove rightmost segment (last 3 children)
        for(let c=0;c<3;c++) s.inner.lastElementChild.remove();
        // Prepend fresh random segment at left end
        s.inner.insertBefore(s.buildSeg(s.segCount),s.inner.firstElementChild);
      }
      s.inner.style.transform=`translateX(${s.offset}px)`;
    });
    modeAnimInterval._raf=requestAnimationFrame(scrollLoop);
  }
  modeAnimInterval={_raf:null, clear:()=>{
    if(modeAnimInterval._raf) cancelAnimationFrame(modeAnimInterval._raf);
    document.querySelectorAll('.film-strip-row').forEach(s=>s.remove());
    STATE.photoElements.forEach(el=>{el.style.display='';});
  }};
  modeAnimInterval._raf=requestAnimationFrame(scrollLoop);
}

// Bloom mode shared vars
let bloomTargets=null;
let bloomBtnEl=null;

function startBloomMode(){
  const elements=STATE.photoElements;
  const size=getModePhotoSize();
  const cx=window.innerWidth/2;
  const cy=window.innerHeight*0.5;
  const maxR=Math.min(window.innerWidth,window.innerHeight)*0.75;
  const n=elements.length;
  // Random positions
  bloomTargets=[];
  for(let i=0;i<n;i++){
    // Random angle + random radius for natural scatter
    const angle=Math.random()*Math.PI*2;
    const r=maxR*Math.sqrt(Math.random())*0.9+maxR*0.05;
    const tx=cx+Math.cos(angle)*r-size/2;
    const ty=cy+Math.sin(angle)*r-size/2;
    bloomTargets.push({x:Math.max(10,Math.min(window.innerWidth-size-10,tx)), y:Math.max(10,Math.min(window.innerHeight-size-10,ty))});
  }
  doBloomAnimation(elements,size);
  // Add "摇一摇" button
  if(!bloomBtnEl){
    bloomBtnEl=document.createElement('button');
    bloomBtnEl.textContent='🫧 摇一摇';
    bloomBtnEl.style.cssText='position:fixed;bottom:30px;left:50%;z-index:6;transform:translateX(-50%);font-family:"ZCOOL KuaiLe","KaiTi",cursive;font-size:18px;background:linear-gradient(135deg,#f093fb,#f557c4);color:#fff;border:none;border-radius:50px;padding:10px 30px;cursor:pointer;letter-spacing:2px;box-shadow:0 6px 25px rgba(240,147,251,0.5);animation:bounce-btn 1.2s ease infinite;';
    bloomBtnEl.onclick=()=>{
      // Re-randomize targets
      const n2=STATE.photoElements.length;
      bloomTargets=[];
      for(let i=0;i<n2;i++){
        const angle=Math.random()*Math.PI*2;
        const r=maxR*Math.sqrt(Math.random())*0.9+maxR*0.05;
        const tx=cx+Math.cos(angle)*r-size/2;
        const ty=cy+Math.sin(angle)*r-size/2;
        bloomTargets.push({x:Math.max(10,Math.min(window.innerWidth-size-10,tx)), y:Math.max(10,Math.min(window.innerHeight-size-10,ty))});
      }
      doBloomAnimation(STATE.photoElements,size);
    };
    document.body.appendChild(bloomBtnEl);
  }
  bloomBtnEl.style.display='inline-block';
}

function doBloomAnimation(elements,size){
  if(modeAnimInterval){clearInterval(modeAnimInterval);}
  const cx=window.innerWidth/2;
  const cy=window.innerHeight*0.5;
  elements.forEach(el=>{
    el.style.width=size+'px';
    el.style.height=size+'px';
    el.style.boxShadow='0 4px 20px rgba(255,107,157,0.4)';
    el.style.border='2px solid rgba(255,255,255,0.5)';
    el.style.borderRadius='6px';
  });
  let progress=0;
  modeAnimInterval=setInterval(()=>{
    progress=Math.min(progress+0.015,1);
    const eased=1-Math.pow(1-progress,3);
    elements.forEach((el,i)=>{
      const tgt=bloomTargets[i];
      const sx=cx-size/2;
      const sy=cy-size/2;
      el.style.transition='none';
      el.style.left=(sx+(tgt.x-sx)*eased)+'px';
      el.style.top=(sy+(tgt.y-sy)*eased)+'px';
      el.style.opacity=(0.3+0.7*eased).toString();
      el.style.transform='scale('+(0.4+0.6*eased)+')';
    });
    if(progress>=1){clearInterval(modeAnimInterval);modeAnimInterval=null;}
  },30);
}

async function setState(newState){

      await animateCakeRise(3000);
      setState('CANDLE_LIT');
      break;

      document.getElementById('center-photo').style.opacity='0.85';
      document.body.style.background='#1a0a10';
      startFallingParticles();
      // Fade heart in
      const fadeStart=performance.now();
      function fadeHeart(now){
        const elapsed=(now-fadeStart)/1000;
        STATE.heartAlpha=Math.min(1,elapsed/5.2);
        if(elapsed<5.2) requestAnimationFrame(fadeHeart);
      }
      requestAnimationFrame(fadeHeart);

      const songDuration=playBirthdaySong();

    case 'SONG_PLAYING':
      break;

    case 'SAXOPHONE_PLAYING':
      // Saxophone music + text typing + cake move ALL simultaneously
      const saxDuration=playSaxophoneBirthday();
      setTimeout(()=>setState('SONG_ENDED'),saxDuration+300);
      startTextTyping();
      // Move cake + heart to left (syncs with saxophone start)
      document.getElementById('three-canvas').style.transition='transform 2.5s cubic-bezier(0.25,0.46,0.45,0.94)';
      document.getElementById('three-canvas').style.transform='translateX(-25%)';
      document.getElementById('heart-canvas').style.transition='transform 2.5s cubic-bezier(0.25,0.46,0.45,0.94)';
      document.getElementById('heart-canvas').style.transform='translateX(-25%)';
      document.getElementById('birthday-msg').style.transition='all 2.5s cubic-bezier(0.25,0.46,0.45,0.94)';
      document.getElementById('birthday-msg').style.transform='translateX(calc(-50% - 25vw)) scale(0.8)';
      document.getElementById('center-photo').style.transform='translate(calc(-50% - 25vw),-50%)';
      break;

    case 'SONG_ENDED':
      stopFallingParticles();
      break;

    case 'TEXT_REVEAL':
      // Legacy entry — delegate to shared typing function
      startTextTyping();
      break;

    case 'WAIT_BUTTON':
      // waiting for button click
      break;

    case 'PHOTOS_POP':
      document.getElementById('love-text-area').style.opacity='0';
      document.getElementById('btn-willing').style.display='none';
      // Center the heart
      document.getElementById('heart-canvas').style.transition='transform 1s ease';
      document.getElementById('heart-canvas').style.transform='translateX(0)';
      document.getElementById('three-canvas').style.transition='opacity 0.8s';
      document.getElementById('three-canvas').style.opacity='0.5';
      document.getElementById('birthday-msg').style.opacity='0';
      document.getElementById('center-photo').style.opacity='0';
      await new Promise(r=>setTimeout(r,1000));
      await animatePhotosPop();
      // Type text in the heart center
      typeHeartCenterText('zdy眼中的小罗宝宝🥰');
      setState('PHOTOS_PULSE');
      break;

    case 'PHOTOS_PULSE':
      startPhotoPulse();
      break;
  }
}

// ============ BUTTON HANDLERS ============
window.handleWilling=function(){
  if(STATE.current!=='WAIT_BUTTON') return;
  // Play the MP3 song
  const bgm=new Audio('7282689666066008893.mp3');
  bgm.loop=true;
  bgm.volume=0.5;
  bgm.play().catch(e=>console.warn('Audio play failed:',e));
  startPhotoFlood();
  setState('PHOTOS_POP');
};

// ============ RENDER LOOP ============
function renderLoop(now){
  requestAnimationFrame(renderLoop);
  if(scene&&camera&&renderer){
    // Animate flame flicker during song phases
    if(STATE.current==='CANDLE_LIT'||STATE.current==='SONG_PLAYING'||STATE.current==='SAXOPHONE_PLAYING'||STATE.current==='SONG_ENDED'){
      const t=now/1000;
      const flicker=1+0.2*Math.sin(t*22)+0.15*Math.sin(t*35)+0.08*Math.sin(t*48);
      STATE.flameMeshes.forEach(f=>f.scale.setScalar(Math.max(0.5,flicker)));
      STATE.flameLights.forEach(l=>{l.intensity=Math.max(0.8,flicker*1.5)});
    }
    renderer.render(scene,camera);
  }
  drawHeart(STATE.heartAlpha);
}

// ============ MAIN INIT ============
async function init(){
  const photoPaths=await buildPhotoList();
  const totalImages=photoPaths.length;

  // Init background
  initBackground();

  // Init heart
  const {points,totalArcLength:totalLen}=buildHeartContour(600);
  heartContourPoints=points;
  totalArcLength=totalLen;
  heartArcTable=buildArcTable(points,totalLen);
  initHeartCanvas();

  // Init Three.js
  initThreeJS();

  // Start render loop
  requestAnimationFrame(renderLoop);

  // Preload images
  const loadingBarEl=document.getElementById('loading-bar-inner');
  const loadingTextEl=document.getElementById('loading-text');
  // Load first batch quickly to start, rest in background
  const MIN_LOAD=50;
  const initialBatch=photoPaths.slice(0,MIN_LOAD);
  const restBatch=photoPaths.slice(MIN_LOAD);
  allPhotos=await preloadImages(initialBatch,(progress)=>{
    loadingBarEl.style.width=(progress*100)+'%';
    loadingTextEl.textContent=`正在准备惊喜... ${Math.round(progress*100)}%`;
  });
  // Load remaining photos in background (doesn't block)
  preloadImages(restBatch).then(rest=>{
    allPhotos=allPhotos.concat(rest);
    // Update photo elements to include newly loaded images
    createPhotoElements(allPhotos);
  });

  // Create photo DOM elements
  createPhotoElements(allPhotos);

  // Hide loading bar, show start button
  const btnStart=document.getElementById('btn-start');
  loadingBarEl.style.display='none';
  loadingTextEl.textContent='惊喜准备好啦！';
  btnStart.style.display='inline-block';

  // Wait for user click to start (unlocks audio)
  btnStart.addEventListener('click',async ()=>{
    btnStart.style.display='none';
    loadingTextEl.textContent='';
    document.getElementById('loading-screen').style.transition='opacity 0.5s';
    document.getElementById('loading-screen').style.opacity='0';
    setTimeout(()=>{
      document.getElementById('loading-screen').style.display='none';
    },500);
    await new Promise(r=>setTimeout(r,600));
    setState('CAKE_RISE');
  },{once:true});
}

init().catch(console.error);
</script>
